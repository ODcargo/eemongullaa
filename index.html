<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Mongolia</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        video, img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        video.active, img.active {
            display: block;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: none;
        }
        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <video id="intro" class="active" autoplay muted>
            <source src="raw/intro.mp4" type="video/mp4">
        </video>
        <video id="loadingvideo">
            <source src="raw/loadingvideo.mp4" type="video/mp4">
        </video>
        <img id="pass0" src="drawable/pass0.png">
        <img id="pass1" src="drawable/pass1.png">
        <img id="pass2" src="drawable/pass2.png">
        <img id="pass3" src="drawable/pass3.png">
        <img id="pass4" src="drawable/pass4.png">
        <img id="firstimage" src="drawable/firstimage.png">
        <img id="info" src="drawable/info.png">
        <img id="image1" src="drawable/image1.png">
        <div id="blackOverlay" class="overlay"></div>
        <img id="image2" src="drawable/image2.png">
    </div>

    <script>
        // Simple sequence: play intro, then show images one by one
        const elements = ['intro', 'pass0', 'pass1', 'pass2', 'pass3', 'pass4', 'firstimage', 'info', 'image1', 'blackOverlay', 'image2'];
        let currentIndex = 0;

        function showNext() {
            if (currentIndex < elements.length) {
                // Hide current
                const current = document.getElementById(elements[currentIndex]);
                current.classList.remove('active');

                currentIndex++;
                if (currentIndex < elements.length) {
                    const next = document.getElementById(elements[currentIndex]);
                    next.classList.add('active');

                    // If it's a video, play it
                    if (next.tagName === 'VIDEO') {
                        next.play();
                        next.onended = showNext;
                    } else {
                        // For images, show for 2 seconds
                        setTimeout(showNext, 2000);
                    }
                }
            }
        }

        // Start after intro ends
        document.getElementById('intro').onended = showNext;
    </script>
</body>
</html>
